<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategoriyalar | Moliyaviy Boshqaruv</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-chart-line"></i><span>Moliyaviy Tizim</span></div>
            <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="income.html" class="nav-item"><i class="fas fa-arrow-up"></i><span>Daromad</span></a>
            <a href="expense.html" class="nav-item"><i class="fas fa-arrow-down"></i><span>Xarajat</span></a>
            <a href="customers.html" class="nav-item"><i class="fas fa-users"></i><span>Mijozlar</span></a>
            <a href="debts.html" class="nav-item"><i class="fas fa-hand-holding-usd"></i><span>Qarzlar</span></a>
            <a href="reports.html" class="nav-item"><i class="fas fa-file-alt"></i><span>Hisobotlar</span></a>
            <a href="categories.html" class="nav-item active"><i class="fas fa-tags"></i><span>Kategoriyalar</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Sozlamalar</span></a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Chiqish</span></button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Qidirish..." id="globalSearch">
            </div>
            <div class="top-actions">
                <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="User">
                    <span>Foydalanuvchi</span>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="page-header">
                <h1>Kategoriyalar</h1>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px;">
                <div class="table-card">
                    <div class="table-header">
                        <h3>Daromad Kategoriyalari</h3>
                        <button class="btn-primary" onclick="addIncomeCategory()">
                            <i class="fas fa-plus"></i> Qo'shish
                        </button>
                    </div>
                    <div id="incomeCategoriesList"></div>
                </div>

                <div class="table-card">
                    <div class="table-header">
                        <h3>Xarajat Kategoriyalari</h3>
                        <button class="btn-primary" onclick="addExpenseCategory()">
                            <i class="fas fa-plus"></i> Qo'shish
                        </button>
                    </div>
                    <div id="expenseCategoriesList"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/categories.js"></script>
</body>
</html>
