<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisobotlar | Moliyaviy Boshqaruv</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-chart-line"></i><span>Moliyaviy Tizim</span></div>
            <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="income.html" class="nav-item"><i class="fas fa-arrow-up"></i><span>Daromad</span></a>
            <a href="expense.html" class="nav-item"><i class="fas fa-arrow-down"></i><span>Xarajat</span></a>
            <a href="customers.html" class="nav-item"><i class="fas fa-users"></i><span>Mijozlar</span></a>
            <a href="debts.html" class="nav-item"><i class="fas fa-hand-holding-usd"></i><span>Qarzlar</span></a>
            <a href="reports.html" class="nav-item active"><i class="fas fa-file-alt"></i><span>Hisobotlar</span></a>
            <a href="categories.html" class="nav-item"><i class="fas fa-tags"></i><span>Kategoriyalar</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Sozlamalar</span></a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Chiqish</span></button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Qidirish..." id="globalSearch">
            </div>
            <div class="top-actions">
                <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="User">
                    <span>Foydalanuvchi</span>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="page-header">
                <h1>Hisobotlar</h1>
            </div>

            <div class="table-card" style="margin-bottom: 20px;">
                <h3 style="margin-bottom: 20px;">Hisobot yaratish</h3>
                <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
                    <div class="form-group" style="flex: 1; min-width: 200px;">
                        <label class="form-label">Sana (dan)</label>
                        <input type="date" class="form-input" id="reportDateFrom">
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 200px;">
                        <label class="form-label">Sana (gacha)</label>
                        <input type="date" class="form-input" id="reportDateTo">
                    </div>
                    <div>
                        <button class="btn-primary" onclick="generateReport()">
                            <i class="fas fa-file-alt"></i> Hisobot yaratish
                        </button>
                    </div>
                </div>
            </div>

            <div id="reportContent" style="display: none;">
                <div class="table-card" style="margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Moliyaviy Hisobot</h3>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn-success" onclick="exportPDF()">
                                <i class="fas fa-file-pdf"></i> PDF
                            </button>
                            <button class="btn-success" onclick="exportExcel()">
                                <i class="fas fa-file-excel"></i> Excel
                            </button>
                            <button class="btn-secondary" onclick="window.print()">
                                <i class="fas fa-print"></i> Chop etish
                            </button>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card income">
                            <div class="stat-info">
                                <p class="stat-label">Jami Daromad</p>
                                <h3 class="stat-value" id="reportIncome">0 so'm</h3>
                            </div>
                        </div>
                        <div class="stat-card expense">
                            <div class="stat-info">
                                <p class="stat-label">Jami Xarajat</p>
                                <h3 class="stat-value" id="reportExpense">0 so'm</h3>
                            </div>
                        </div>
                        <div class="stat-card profit">
                            <div class="stat-info">
                                <p class="stat-label">Sof Foyda</p>
                                <h3 class="stat-value" id="reportProfit">0 so'm</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="table-card">
                    <h3 style="margin-bottom: 20px;">Batafsil Ma'lumot</h3>
                    <div id="reportDetails"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
