<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qarzlar | Moliyaviy Boshqaruv</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-chart-line"></i><span>Moliyaviy Tizim</span></div>
            <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="income.html" class="nav-item"><i class="fas fa-arrow-up"></i><span>Daromad</span></a>
            <a href="expense.html" class="nav-item"><i class="fas fa-arrow-down"></i><span>Xarajat</span></a>
            <a href="customers.html" class="nav-item"><i class="fas fa-users"></i><span>Mijozlar</span></a>
            <a href="debts.html" class="nav-item active"><i class="fas fa-hand-holding-usd"></i><span>Qarzlar</span></a>
            <a href="reports.html" class="nav-item"><i class="fas fa-file-alt"></i><span>Hisobotlar</span></a>
            <a href="categories.html" class="nav-item"><i class="fas fa-tags"></i><span>Kategoriyalar</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Sozlamalar</span></a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Chiqish</span></button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Qidirish..." id="globalSearch">
            </div>
            <div class="top-actions">
                <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="User">
                    <span>Foydalanuvchi</span>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="page-header">
                <h1>Qarzlar</h1>
                <button class="btn-primary" onclick="openDebtModal()">
                    <i class="fas fa-plus"></i> Yangi qarz
                </button>
            </div>

            <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
                <div class="stat-card income">
                    <div class="stat-icon"><i class="fas fa-arrow-down"></i></div>
                    <div class="stat-info">
                        <p class="stat-label">Menga qarz</p>
                        <h3 class="stat-value" id="totalReceivable">0 so'm</h3>
                    </div>
                </div>
                <div class="stat-card expense">
                    <div class="stat-icon"><i class="fas fa-arrow-up"></i></div>
                    <div class="stat-info">
                        <p class="stat-label">Menda qarz</p>
                        <h3 class="stat-value" id="totalPayable">0 so'm</h3>
                    </div>
                </div>
            </div>

            <div class="table-card">
                <div class="table-header">
                    <h3>Qarzlar ro'yxati</h3>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-secondary" onclick="filterDebts('all')">Barchasi</button>
                        <button class="btn-secondary" onclick="filterDebts('receive')">Olish</button>
                        <button class="btn-secondary" onclick="filterDebts('pay')">To'lash</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table id="debtTable">
                        <thead>
                            <tr>
                                <th>Turi</th>
                                <th>Ism</th>
                                <th>Miqdor</th>
                                <th>Muddat</th>
                                <th>Status</th>
                                <th>Izoh</th>
                                <th>Amallar</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>


    <div class="modal" id="debtModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Yangi qarz qo'shish</h2>
                <button class="modal-close" onclick="closeDebtModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="debtForm" onsubmit="saveDebt(event)">
                <input type="hidden" id="debtId">
                <div class="form-group">
                    <label class="form-label">Turi *</label>
                    <select class="form-select" id="debtType" required>
                        <option value="receive">Menga qarz (olish kerak)</option>
                        <option value="pay">Menda qarz (to'lash kerak)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Ism *</label>
                    <input type="text" class="form-input" id="debtName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Miqdor (so'm) *</label>
                    <input type="number" class="form-input" id="debtAmount" required min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">Muddat</label>
                    <input type="date" class="form-input" id="debtDueDate">
                </div>
                <div class="form-group">
                    <label class="form-label">Izoh</label>
                    <textarea class="form-textarea" id="debtNotes"></textarea>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn-secondary" onclick="closeDebtModal()">Bekor qilish</button>
                    <button type="submit" class="btn-primary">Saqlash</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/debts.js"></script>
</body>
</html>
