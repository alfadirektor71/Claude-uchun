<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balans - SeenSMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><div class="logo"><i class="fas fa-chart-line"></i><span>SeenSMS</span></div></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="new-order.html" class="nav-item"><i class="fas fa-plus-circle"></i><span>Yangi buyurtma</span></a>
                <a href="orders.html" class="nav-item"><i class="fas fa-list"></i><span>Buyurtmalar</span></a>
                <a href="services.html" class="nav-item"><i class="fas fa-box"></i><span>Xizmatlar</span></a>
                <a href="balance.html" class="nav-item active"><i class="fas fa-wallet"></i><span>Balans</span></a>
                <a href="reports.html" class="nav-item"><i class="fas fa-chart-bar"></i><span>Hisobotlar</span></a>
                <a href="tickets.html" class="nav-item"><i class="fas fa-ticket-alt"></i><span>Yordam</span></a>
                <div class="nav-divider"></div>
                <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Sozlamalar</span></a>
                <a href="api.html" class="nav-item"><i class="fas fa-code"></i><span>API</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-card">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-info"><h4 id="userName">Foydalanuvchi</h4><p>Bepul Foydalanuvchi</p></div>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left"><button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button><h1>Balans va To'lov</h1></div>
            </header>

            <section style="padding: 30px;">
                <div class="content-grid" style="grid-template-columns: 2fr 1fr; gap: 30px;">
                    <div>
                        <div class="content-card" style="background: var(--gradient-1); color: white; margin-bottom: 30px;">
                            <div style="padding: 40px;">
                                <p style="opacity: 0.9; margin-bottom: 10px;">Joriy Balans</p>
                                <h1 style="font-size: 56px; margin-bottom: 20px;" id="currentBalance">$0.00</h1>
                                <p style="opacity: 0.8;">Ro'yxatdan o'tish bonusi: $50.00</p>
                            </div>
                        </div>

                        <div class="content-card">
                            <div class="card-header"><h3><i class="fas fa-credit-card"></i> Balansni To'ldirish</h3></div>
                            <form id="addBalanceForm" style="padding: 30px;">
                                <div class="form-group">
                                    <label><i class="fas fa-dollar-sign"></i> Summa</label>
                                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px;">
                                        <button type="button" class="amount-btn" onclick="setAmount(10)">$10</button>
                                        <button type="button" class="amount-btn" onclick="setAmount(25)">$25</button>
                                        <button type="button" class="amount-btn" onclick="setAmount(50)">$50</button>
                                        <button type="button" class="amount-btn" onclick="setAmount(100)">$100</button>
                                    </div>
                                    <input type="number" id="amount" placeholder="Summani kiriting" min="5" step="1" required>
                                    <small class="form-hint">Minimal: $5</small>
                                </div>

                                <div class="form-group">
                                    <label><i class="fas fa-credit-card"></i> To'lov Usuli</label>
                                    <div class="payment-methods">
                                        <label class="payment-method">
                                            <input type="radio" name="method" value="card" checked>
                                            <div class="method-card"><i class="fas fa-credit-card"></i><span>Karta</span></div>
                                        </label>
                                        <label class="payment-method">
                                            <input type="radio" name="method" value="paypal">
                                            <div class="method-card"><i class="fab fa-paypal"></i><span>PayPal</span></div>
                                        </label>
                                        <label class="payment-method">
                                            <input type="radio" name="method" value="crypto">
                                            <div class="method-card"><i class="fab fa-bitcoin"></i><span>Crypto</span></div>
                                        </label>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary btn-full btn-large">
                                    <i class="fas fa-plus"></i> To'ldirish
                                </button>
                            </form>
                        </div>
                    </div>

                    <div>
                        <div class="content-card">
                            <div class="card-header"><h3><i class="fas fa-history"></i> Tarix</h3></div>
                            <div id="transactionsHistory" style="padding: 20px;">
                                <p style="text-align: center; color: var(--text-muted); padding: 40px 20px;">
                                    <i class="fas fa-receipt" style="font-size: 48px; margin-bottom: 15px; display: block;"></i>
                                    Hali tranzaksiyalar yo'q
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <style>
        .amount-btn{padding:15px;background:var(--dark-bg);border:2px solid var(--dark-border);border-radius:10px;color:var(--text-primary);cursor:pointer;transition:var(--transition);font-weight:600;font-size:18px}.amount-btn:hover,.amount-btn.active{background:var(--gradient-1);border-color:var(--primary-color);color:white}.payment-methods{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.payment-method input{display:none}.method-card{padding:20px;background:var(--dark-bg);border:2px solid var(--dark-border);border-radius:12px;text-align:center;cursor:pointer;transition:var(--transition)}.method-card i{font-size:32px;margin-bottom:10px;display:block}.payment-method input:checked~.method-card{background:var(--gradient-1);border-color:var(--primary-color);color:white}
    </style>

    <script src="js/storage.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        const user=userManager.getCurrentUser();
        if(user){
            document.getElementById('userName').textContent=user.firstName;
            document.getElementById('currentBalance').textContent=formatCurrency(user.balance);
        }
        
        function setAmount(val){
            document.getElementById('amount').value=val;
            document.querySelectorAll('.amount-btn').forEach(b=>b.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        document.getElementById('addBalanceForm').addEventListener('submit',function(e){
            e.preventDefault();
            const amount=parseFloat(document.getElementById('amount').value);
            const method=document.querySelector('input[name="method"]:checked').value;
            
            if(amount<5){
                alert('Minimal summa: $5');
                return;
            }
            
            const result=transactionManager.addTransaction({
                type:'deposit',
                amount:amount,
                method:method,
                description:`Balans to'ldirildi - ${method}`,
                status:'completed'
            });
            
            if(result.success){
                alert('Balans muvaffaqiyatli to\'ldirildi!');
                location.reload();
            }
        });
    </script>
</body>
</html>
