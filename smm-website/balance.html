<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balans - SeenSMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span>SeenSMS</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="new-order.html" class="nav-item">
                    <i class="fas fa-plus-circle"></i>
                    <span>Yangi buyurtma</span>
                </a>
                <a href="orders.html" class="nav-item">
                    <i class="fas fa-list"></i>
                    <span>Buyurtmalar</span>
                </a>
                <a href="balance.html" class="nav-item active">
                    <i class="fas fa-wallet"></i>
                    <span>Balans</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-card">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-info">
                        <h4 id="userName">Foydalanuvchi</h4>
                        <p>Bepul Foydalanuvchi</p>
                    </div>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>
                    <h1>Balans</h1>
                </div>
            </header>
            <section style="padding: 30px;">
                <div class="content-card">
                    <div style="padding: 40px; text-align: center;">
                        <i class="fas fa-wallet" style="font-size: 80px; color: var(--success-color); margin-bottom: 20px;"></i>
                        <h2>Hisobingiz</h2>
                        <h1 style="font-size: 48px; margin: 20px 0;" id="balanceDisplay">$100.00</h1>
                        <p style="color: var(--text-secondary); margin: 20px 0;">To'lov tizimi tez orada qo'shiladi...</p>
                        <a href="dashboard.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Dashboard</a>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        // Show current balance
        const user = userManager.getCurrentUser();
        if (user) {
            document.getElementById('balanceDisplay').textContent = formatCurrency(user.balance);
        }
    </script>
</body>
</html>
