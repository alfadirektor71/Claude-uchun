<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyurtmalar - SeenSMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .orders-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .orders-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: var(--dark-card);
            border: 2px solid var(--dark-border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: var(--transition);
        }
        
        .stat-box:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
        }
        
        .stat-box h3 {
            font-size: 32px;
            margin-bottom: 8px;
            color: var(--primary-color);
        }
        
        .stat-box p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .filters-bar {
            background: var(--dark-card);
            border: 2px solid var(--dark-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            background: var(--dark-bg);
            border: 2px solid var(--dark-border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }
        
        .filter-btn.active {
            background: var(--gradient-1);
            border-color: var(--primary-color);
            color: white;
        }
        
        .order-card {
            background: var(--dark-card);
            border: 2px solid var(--dark-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            transition: var(--transition);
        }
        
        .order-card:hover {
            border-color: var(--primary-color);
            transform: translateX(5px);
        }
        
        .order-header {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .order-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .order-icon i {
            font-size: 28px;
            color: white;
        }
        
        .order-main-info {
            flex: 1;
        }
        
        .order-main-info h4 {
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .order-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .order-body {
            padding: 20px;
            background: var(--dark-bg);
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .order-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .detail-label {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .detail-value {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .order-progress {
            margin-top: 15px;
        }
        
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .progress-bar-container {
            height: 8px;
            background: var(--dark-border);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: var(--gradient-1);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .order-completed {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--success-color);
            font-size: 14px;
            margin-top: 15px;
        }
        
        .order-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .btn-sm {
            padding: 8px 16px;
            font-size: 14px;
        }
        
        #emptyState {
            text-align: center;
            padding: 80px 20px;
        }
        
        @media (max-width: 768px) {
            .orders-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .order-details {
                grid-template-columns: 1fr;
            }
            
            .order-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span>SeenSMS</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="new-order.html" class="nav-item">
                    <i class="fas fa-plus-circle"></i>
                    <span>Yangi buyurtma</span>
                </a>
                <a href="orders.html" class="nav-item active">
                    <i class="fas fa-list"></i>
                    <span>Buyurtmalar</span>
                </a>
                <a href="services.html" class="nav-item">
                    <i class="fas fa-box"></i>
                    <span>Xizmatlar</span>
                </a>
                <a href="balance.html" class="nav-item">
                    <i class="fas fa-wallet"></i>
                    <span>Balans</span>
                </a>
                <a href="reports.html" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Hisobotlar</span>
                </a>
                <a href="tickets.html" class="nav-item">
                    <i class="fas fa-ticket-alt"></i>
                    <span>Yordam</span>
                </a>
                <div class="nav-divider"></div>
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Sozlamalar</span>
                </a>
                <a href="api.html" class="nav-item">
                    <i class="fas fa-code"></i>
                    <span>API</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-card">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-info">
                        <h4 id="userName">Foydalanuvchi</h4>
                        <p>Bepul Foydalanuvchi</p>
                    </div>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>
                    <h1>Buyurtmalar</h1>
                </div>
                <div class="top-bar-right">
                    <a href="new-order.html" class="btn btn-primary">
                        <i class="fas fa-plus"></i>
                        <span>Yangi Buyurtma</span>
                    </a>
                </div>
            </header>

            <section style="padding: 30px;">
                <div id="orderAlert" class="alert" style="display: none;"></div>

                <!-- Stats -->
                <div class="orders-stats">
                    <div class="stat-box">
                        <h3 id="totalOrders">0</h3>
                        <p>Jami Buyurtmalar</p>
                    </div>
                    <div class="stat-box">
                        <h3 id="completedOrders">0</h3>
                        <p>Bajarilgan</p>
                    </div>
                    <div class="stat-box">
                        <h3 id="pendingOrders">0</h3>
                        <p>Jarayonda</p>
                    </div>
                    <div class="stat-box">
                        <h3 id="cancelledOrders">0</h3>
                        <p>Bekor qilingan</p>
                    </div>
                </div>

                <!-- Filters -->
                <div class="filters-bar">
                    <div class="filter-group">
                        <button class="filter-btn active" data-filter="all">
                            <i class="fas fa-th"></i> Barchasi
                        </button>
                        <button class="filter-btn" data-filter="pending">
                            <i class="fas fa-clock"></i> Kutilmoqda
                        </button>
                        <button class="filter-btn" data-filter="in-progress">
                            <i class="fas fa-spinner"></i> Jarayonda
                        </button>
                        <button class="filter-btn" data-filter="completed">
                            <i class="fas fa-check"></i> Bajarilgan
                        </button>
                        <button class="filter-btn" data-filter="cancelled">
                            <i class="fas fa-times"></i> Bekor qilingan
                        </button>
                    </div>
                    
                    <div style="margin-left: auto; display: flex; gap: 15px;">
                        <input 
                            type="text" 
                            id="searchOrders" 
                            placeholder="Qidirish..."
                            style="padding: 10px 15px; background: var(--dark-bg); border: 2px solid var(--dark-border); border-radius: 8px; color: var(--text-primary);"
                        >
                        <select 
                            id="sortOrders"
                            style="padding: 10px 15px; background: var(--dark-bg); border: 2px solid var(--dark-border); border-radius: 8px; color: var(--text-primary); cursor: pointer;"
                        >
                            <option value="date-desc">Yangi birinchi</option>
                            <option value="date-asc">Eski birinchi</option>
                            <option value="price-desc">Qimmat birinchi</option>
                            <option value="price-asc">Arzon birinchi</option>
                            <option value="status">Status bo'yicha</option>
                        </select>
                    </div>
                </div>

                <!-- Orders List -->
                <div id="ordersContainer"></div>
                
                <!-- Empty State -->
                <div id="emptyState" style="display: none;"></div>
            </section>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/orders.js"></script>
</body>
</html>
