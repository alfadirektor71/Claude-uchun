<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xizmatlar Boshqaruvi - SeenSMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .services-grid {
            display: grid;
            gap: 15px;
        }
        .service-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .service-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .service-details {
            flex: 1;
        }
        .service-details h4 {
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .service-meta {
            display: flex;
            gap: 20px;
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 10px;
        }
        .service-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .price-badge {
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
        }
        .profit-badge {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
        }
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-bar select, .filter-bar input {
            padding: 10px 15px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span>SeenSMS Admin</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="admin.html" class="nav-item"><i class="fas fa-cog"></i><span>API Sozlamalari</span></a>
                <a href="services-admin.html" class="nav-item active"><i class="fas fa-boxes"></i><span>Xizmatlar</span></a>
                <a href="orders.html" class="nav-item"><i class="fas fa-list"></i><span>Buyurtmalar</span></a>
                <a href="balance.html" class="nav-item"><i class="fas fa-wallet"></i><span>Balans</span></a>
                <div class="nav-divider"></div>
                <a href="settings.html" class="nav-item"><i class="fas fa-user-cog"></i><span>Sozlamalar</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-card">
                    <div class="user-avatar"><i class="fas fa-user-shield"></i></div>
                    <div class="user-info">
                        <h4 id="userName">Admin</h4>
                        <p>Administrator</p>
                    </div>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>
                    <h1>Xizmatlar Boshqaruvi</h1>
                </div>
                <div class="top-bar-right">
                    <button class="btn btn-primary" onclick="showAddServiceModal()">
                        <i class="fas fa-plus"></i> Yangi Xizmat
                    </button>
                </div>
            </header>

            <section style="padding: 30px;">
                <!-- Statistics -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                    <div class="stat-card">
                        <div class="stat-icon blue"><i class="fas fa-boxes"></i></div>
                        <div class="stat-info">
                            <p class="stat-label">Jami Xizmatlar</p>
                            <h3 class="stat-number" id="totalServices">0</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="fas fa-eye"></i></div>
                        <div class="stat-info">
                            <p class="stat-label">Faol Xizmatlar</p>
                            <h3 class="stat-number" id="activeServices">0</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon purple"><i class="fas fa-dollar-sign"></i></div>
                        <div class="stat-info">
                            <p class="stat-label">O'rtacha Margin</p>
                            <h3 class="stat-number" id="avgMargin">0%</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-info">
                            <p class="stat-label">Potentsial Foyda</p>
                            <h3 class="stat-number" id="potentialProfit">$0</h3>
                        </div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="content-card" style="margin-bottom: 20px;">
                    <div class="filter-bar">
                        <select id="filterCategory" onchange="filterServices()">
                            <option value="">Barcha kategoriyalar</option>
                            <option value="telegram">Telegram</option>
                            <option value="instagram">Instagram</option>
                            <option value="youtube">YouTube</option>
                            <option value="facebook">Facebook</option>
                            <option value="twitter">Twitter/X</option>
                            <option value="tiktok">TikTok</option>
                            <option value="spotify">Spotify</option>
                            <option value="other">Boshqa</option>
                        </select>
                        <input type="text" id="searchService" placeholder="Xizmat qidirish..." onkeyup="filterServices()">
                        <select id="sortBy" onchange="filterServices()">
                            <option value="name">Nomi bo'yicha</option>
                            <option value="price-asc">Narx (arzon)</option>
                            <option value="price-desc">Narx (qimmat)</option>
                            <option value="margin-desc">Foyda (ko'p)</option>
                        </select>
                    </div>
                </div>

                <!-- Services List -->
                <div class="content-card">
                    <div class="services-grid" id="servicesList"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Service Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;"><i class="fas fa-edit"></i> Xizmatni Tahrirlash</h3>
            <form id="editForm">
                <input type="hidden" id="editServiceId">
                
                <div class="form-group">
                    <label>Xizmat nomi:</label>
                    <input type="text" id="editServiceName" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Provider narxi ($):</label>
                        <input type="number" id="editOriginalPrice" step="0.0001" readonly style="background: var(--dark-bg);">
                    </div>
                    <div class="form-group">
                        <label>Sizning narxingiz ($):</label>
                        <input type="number" id="editPrice" step="0.0001" required onchange="calculateMargin()">
                    </div>
                </div>

                <div class="form-group">
                    <label>Margin (%):</label>
                    <input type="number" id="editMargin" step="0.1" onchange="calculatePriceFromMargin()">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Min:</label>
                        <input type="number" id="editMin" required>
                    </div>
                    <div class="form-group">
                        <label>Max:</label>
                        <input type="number" id="editMax" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Kategoriya:</label>
                    <select id="editCategory">
                        <option value="telegram">Telegram</option>
                        <option value="instagram">Instagram</option>
                        <option value="youtube">YouTube</option>
                        <option value="facebook">Facebook</option>
                        <option value="twitter">Twitter/X</option>
                        <option value="tiktok">TikTok</option>
                        <option value="spotify">Spotify</option>
                        <option value="other">Boshqa</option>
                    </select>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 20px;">
                    <button type="button" class="btn btn-primary" onclick="saveService()" style="flex: 1;">
                        <i class="fas fa-save"></i> Saqlash
                    </button>
                    <button type="button" class="btn btn-outline" onclick="closeModal()" style="flex: 1;">
                        <i class="fas fa-times"></i> Bekor qilish
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/services-admin.js"></script>
</body>
</html>
