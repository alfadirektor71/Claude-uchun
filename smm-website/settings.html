<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sozlamalar - SeenSMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><div class="logo"><i class="fas fa-chart-line"></i><span>SeenSMS</span></div></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="new-order.html" class="nav-item"><i class="fas fa-plus-circle"></i><span>Yangi buyurtma</span></a>
                <a href="orders.html" class="nav-item"><i class="fas fa-list"></i><span>Buyurtmalar</span></a>
                <a href="services.html" class="nav-item"><i class="fas fa-box"></i><span>Xizmatlar</span></a>
                <a href="balance.html" class="nav-item"><i class="fas fa-wallet"></i><span>Balans</span></a>
                <a href="reports.html" class="nav-item"><i class="fas fa-chart-bar"></i><span>Hisobotlar</span></a>
                <a href="tickets.html" class="nav-item"><i class="fas fa-ticket-alt"></i><span>Yordam</span></a>
                <div class="nav-divider"></div>
                <a href="settings.html" class="nav-item active"><i class="fas fa-cog"></i><span>Sozlamalar</span></a>
                <a href="api.html" class="nav-item"><i class="fas fa-code"></i><span>API</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-card">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-info"><h4 id="userName">Foydalanuvchi</h4><p>Bepul Foydalanuvchi</p></div>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left"><button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button><h1>Sozlamalar</h1></div>
            </header>

            <section style="padding: 30px;">
                <div class="content-card" style="margin-bottom: 20px;">
                    <div class="card-header"><h3><i class="fas fa-user"></i> Profil Ma'lumotlari</h3></div>
                    <form style="padding: 30px;">
                        <div class="form-row">
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> Ism</label>
                                <input type="text" id="firstName" placeholder="Ismingiz">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> Familiya</label>
                                <input type="text" id="lastName" placeholder="Familiyangiz">
                            </div>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" id="email" placeholder="Email manzil">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Telefon</label>
                            <input type="tel" id="phone" placeholder="+998 90 123 45 67">
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Saqlash</button>
                    </form>
                </div>

                <div class="content-card" style="margin-bottom: 20px;">
                    <div class="card-header"><h3><i class="fas fa-lock"></i> Parolni O'zgartirish</h3></div>
                    <form style="padding: 30px;">
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Joriy Parol</label>
                            <input type="password" placeholder="Joriy parol">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Yangi Parol</label>
                            <input type="password" placeholder="Yangi parol">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Parolni Tasdiqlang</label>
                            <input type="password" placeholder="Parolni tasdiqlang">
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-key"></i> Parolni O'zgartirish</button>
                    </form>
                </div>

                <div class="content-card">
                    <div class="card-header"><h3><i class="fas fa-bell"></i> Bildirishnomalar</h3></div>
                    <div style="padding: 30px;">
                        <label style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; cursor: pointer;">
                            <div>
                                <strong>Email bildirishnomalar</strong>
                                <p style="font-size: 14px; color: var(--text-secondary); margin-top: 5px;">Buyurtma yangilanishlari</p>
                            </div>
                            <input type="checkbox" checked style="width: 20px; height: 20px;">
                        </label>
                        <label style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; cursor: pointer;">
                            <div>
                                <strong>SMS bildirishnomalar</strong>
                                <p style="font-size: 14px; color: var(--text-secondary); margin-top: 5px;">Muhim yangilanishlar</p>
                            </div>
                            <input type="checkbox" style="width: 20px; height: 20px;">
                        </label>
                        <label style="display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
                            <div>
                                <strong>Marketing xabarlari</strong>
                                <p style="font-size: 14px; color: var(--text-secondary); margin-top: 5px;">Takliflar va chegirmalar</p>
                            </div>
                            <input type="checkbox" checked style="width: 20px; height: 20px;">
                        </label>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        const user=userManager.getCurrentUser();
        if(user){
            document.getElementById('userName').textContent=user.firstName;
            document.getElementById('firstName').value=user.firstName;
            document.getElementById('lastName').value=user.lastName;
            document.getElementById('email').value=user.email;
            document.getElementById('phone').value=user.phone;
        }
    </script>
</body>
</html>
